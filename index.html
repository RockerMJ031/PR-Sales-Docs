<title>PR Sales Docs · Index</title>
<style>
  :root {
    --teal: #2a7a8a;
    --teal-light: #e0f0f2;
    --primary: #2a1a3e;
    --muted: #6a5a7a;
    --line: #e0d8e8;
    --cream: #fafaf7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Segoe UI", sans-serif;
    color: var(--primary);
    background: var(--cream);
    line-height: 1.6;
    padding: 60px 24px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 8px; }
  .sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .card {
    display: block; background: white; border: 1px solid var(--line);
    border-left: 4px solid var(--teal); padding: 20px 24px; border-radius: 6px;
    margin-bottom: 14px; text-decoration: none; color: var(--primary);
    transition: box-shadow .15s, transform .15s;
  }
  .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.06); transform: translateY(-1px); }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: var(--teal); }
  .card-desc { font-size: 13px; color: var(--muted); }
  footer { margin-top: 40px; font-size: 11px; color: var(--muted); letter-spacing: 2px; text-align: center; }
</style>
</head>
<body>
  <div class="wrap">

    </a>

    <footer>— PURPLE RULER · INTERNAL —</footer>
  </div>
</body>
